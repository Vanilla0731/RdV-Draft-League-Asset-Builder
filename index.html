<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RdV Draft League Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --c-ink:#0e0f13;
    --c-panel:#1b1e27;
    --c-panel-2:#20232d;
    --c-line:#2a2e3a;
    --c-gold:#d4a954;
    --c-gold-dim:#8c7038;
    --c-text:#edeef2;
    --c-text-dim:#8a8f9c;
    --c-danger:#e5484d;

    --hex-w-sm: clamp(76px, 8.4vw, 130px);
    --hex-h-sm: calc(var(--hex-w-sm) * 1.1547);
    --hex-w-lg: clamp(150px, 17vw, 224px);
    --hex-h-lg: calc(var(--hex-w-lg) * 1.1547);
    --hex-w-md: clamp(96px, 12vw, 150px);
    --hex-h-md: calc(var(--hex-w-md) * 1.1547);
    --hex-w-xs: clamp(58px, 6.4vw, 92px);
    --hex-h-xs: calc(var(--hex-w-xs) * 1.1547);
    --gap-sm: clamp(10px, 1.4vw, 18px);
    --gap-xs: clamp(8px, 1vw, 14px);

    --hex-poly: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse 900px 500px at 50% 8%, rgba(212,169,84,0.10), transparent 60%),
      var(--c-ink);
    color:var(--c-text);
    font-family:'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
  }

  .page{ width:100%; max-width:960px; display:flex; flex-direction:column; align-items:center; }

  /* ---------- Toolbar ---------- */
  .toolbar-top{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:22px;
  }
  .mode-switch{
    display:flex; gap:4px;
    background:var(--c-panel);
    border:1px solid var(--c-line);
    border-radius:10px;
    padding:4px;
  }
  .mode-btn{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:12.5px;
    padding:8px 14px;
    border-radius:7px;
    border:none;
    background:transparent;
    color:var(--c-text-dim);
    cursor:pointer;
    transition:background .18s ease, color .18s ease;
  }
  .mode-btn:hover:not(.active){ color:var(--c-text); }
  .mode-btn.active{ background:var(--c-gold); color:#20160a; }

  .toolbar-actions{ display:flex; gap:10px; }
  .btn{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13.5px;
    letter-spacing:.02em;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    border:1px solid var(--c-line);
    background:var(--c-panel);
    color:var(--c-text);
    transition:transform .15s ease, border-color .2s ease, background .2s ease;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .btn:hover{ transform:translateY(-1px); border-color:var(--c-gold-dim); }
  .btn:active{ transform:translateY(0); }
  .btn-gold{ background:var(--c-gold); border-color:var(--c-gold); color:#20160a; }
  .btn-gold:hover{ background:#e0b866; border-color:#e0b866; }
  .btn:focus-visible, .mode-btn:focus-visible, .hex-slot:focus-visible .hex-border, [contenteditable]:focus-visible{
    outline:2px solid var(--c-gold);
    outline-offset:2px;
  }

  /* ---------- Card (zone exportée) ---------- */
  .card{
    width:100%;
    background:linear-gradient(180deg, var(--c-panel) 0%, var(--c-panel-2) 100%);
    border:1px solid var(--c-line);
    border-radius:20px;
    padding:clamp(28px, 5vw, 56px) clamp(16px, 5vw, 48px) 44px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-weight:600;
    font-size:12px;
    letter-spacing:.18em;
    color:var(--c-gold);
    margin-bottom:14px;
    text-align:center;
  }

  .main-title{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:clamp(34px, 6.4vw, 64px);
    letter-spacing:.03em;
    line-height:1.02;
    text-align:center;
    margin:0 0 6px;
    color:var(--c-text);
    outline:none;
    max-width:100%;
    word-break:break-word;
  }
  .sub-title{
    font-family:'Inter', sans-serif;
    font-weight:500;
    font-size:clamp(14px, 2vw, 18px);
    color:var(--c-text-dim);
    text-align:center;
    margin:0 0 30px;
    outline:none;
  }
  [contenteditable]:empty::before{
    content:attr(data-placeholder);
    color:var(--c-text-dim);
    opacity:.55;
  }
  [contenteditable]{ cursor:text; }
  [contenteditable]:hover{ background:rgba(255,255,255,0.03); border-radius:6px; }

  /* ---------- Mode views ---------- */
  .mode-view{ display:none; width:100%; flex-direction:column; align-items:center; }
  .mode-view.active{ display:flex; }

  /* ---------- Hexagones (génériques) ---------- */
  .profile-wrap{ margin-bottom:34px; position:relative; z-index:2; }

  .hex-slot{ position:relative; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .hex-slot--profile-lg{ width:var(--hex-w-lg); height:var(--hex-h-lg); }
  .hex-slot--profile-md{ width:var(--hex-w-md); height:var(--hex-h-md); }
  .hex-slot--sm{ width:var(--hex-w-sm); height:var(--hex-h-sm); }
  .hex-slot--xs{ width:var(--hex-w-xs); height:var(--hex-h-xs); }

  .hex-border{
    position:relative;
    width:100%; height:100%;
    clip-path:var(--hex-poly);
    background:var(--ring-color, var(--c-line));
    transition:transform .18s ease, background-color .35s ease;
  }
  .hex-slot--is-profile .hex-border{ background:var(--c-gold); }
  .hex-slot:hover .hex-border{ transform:translateY(-4px) scale(1.035); }
  .hex-border.is-error{ animation:err-pulse .85s ease; }
  @keyframes err-pulse{
    0%,100%{ background:var(--ring-color, var(--c-line)); }
    30%{ background:var(--c-danger); }
  }
  .hex-slot--is-profile .hex-border.is-error{ animation:err-pulse-gold .85s ease; }
  @keyframes err-pulse-gold{
    0%,100%{ background:var(--c-gold); }
    30%{ background:var(--c-danger); }
  }

  .hex-content{
    position:absolute; inset:5px;
    clip-path:var(--hex-poly);
    background:var(--c-panel);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* Rendu des images en background-cover : centrées, ajustées, bords
     tronqués si nécessaire — jamais étirées. L'export PNG n'utilise pas
     ce DOM : il est dessiné par un moteur canvas dédié (voir la section
     Export PNG du script) qui reproduit le même cadrage "cover". */
  .hex-img{
    width:100%; height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:none;
  }
  .hex-img.visible{ display:block; }

  .hex-placeholder{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    color:var(--c-text-dim);
    pointer-events:none;
  }
  .hex-placeholder .plus{ font-size:1.6em; font-weight:300; line-height:1; }
  .hex-placeholder .hex-label{ font-size:11px; letter-spacing:.05em; text-transform:uppercase; }
  .hex-slot.filled .hex-placeholder{ display:none; }

  .pick-tag{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%);
    background:var(--c-ink);
    border:1px solid var(--c-line);
    color:var(--c-gold);
    font-family:'JetBrains Mono', monospace;
    font-size:10px; font-weight:600; letter-spacing:.04em;
    padding:2px 7px;
    border-radius:999px;
    z-index:3;
    white-space:nowrap;
  }

  .clear-btn{
    position:absolute; top:-6px; right:6px;
    width:20px; height:20px; border-radius:50%;
    background:var(--c-ink); border:1px solid var(--c-line);
    color:var(--c-text-dim);
    font-size:12px; line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0; transition:opacity .15s ease, color .15s ease, border-color .15s ease;
    z-index:4;
  }
  .hex-slot.filled:hover .clear-btn,
  .hex-slot.filled:focus-within .clear-btn{ opacity:1; }
  .clear-btn:hover{ color:var(--c-danger); border-color:var(--c-danger); }

  .spinner{
    width:22px; height:22px;
    border:2.5px solid var(--c-line);
    border-top-color:var(--c-gold);
    border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .hex-slot.loading .spinner{ display:block; }
  .hex-slot.loading .hex-placeholder{ display:none; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Editeur inline (saisie nom pokemon) ---------- */
  .hex-editor{
    position:absolute;
    top:calc(100% + 10px);
    left:50%;
    transform:translateX(-50%);
    background:var(--c-ink);
    border:1px solid var(--c-gold-dim);
    border-radius:10px;
    padding:9px 10px;
    z-index:50;
    box-shadow:0 12px 28px rgba(0,0,0,0.45);
    display:flex;
    flex-direction:column;
    gap:5px;
    width:max-content;
  }
  .hex-editor input{
    width:150px;
    background:var(--c-panel);
    border:1px solid var(--c-line);
    border-radius:6px;
    color:var(--c-text);
    font-family:'Inter', sans-serif;
    font-size:13px;
    padding:7px 9px;
    outline:none;
  }
  .hex-editor input:focus{ border-color:var(--c-gold); }
  .hex-editor small{ color:var(--c-text-dim); font-size:10px; line-height:1.3; }

  .hex-suggest{
    display:none;
    flex-direction:column;
    max-height:172px;
    overflow-y:auto;
    margin-top:2px;
    border:1px solid var(--c-line);
    border-radius:6px;
    background:var(--c-panel);
  }
  .hex-suggest.open{ display:flex; }
  .hex-suggest button{
    text-align:left;
    background:transparent;
    border:none;
    color:var(--c-text);
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    padding:6px 9px;
    cursor:pointer;
  }
  .hex-suggest button:hover,
  .hex-suggest button.highlight{
    background:var(--c-gold);
    color:#20160a;
  }
  .hex-suggest .suggest-empty{
    color:var(--c-text-dim);
    font-size:11px;
    padding:6px 9px;
  }

  /* ---------- Grille solo (nid d'abeille 5+5) ---------- */
  .team-grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:6px;
    position:relative;
    z-index:1;
  }
  .hex-row{ display:flex; gap:var(--row-gap, var(--gap-sm)); }
  .hex-row--offset{
    margin-top:calc(var(--hex-h-sm) * -0.26);
    transform:translateX(calc((var(--hex-w-sm) + var(--gap-sm)) / 2));
  }
  .hex-row--offset-xs{
    margin-top:calc(var(--hex-h-xs) * -0.26);
    transform:translateX(calc((var(--hex-w-xs) + var(--gap-xs)) / 2));
  }

  /* ---------- Mode Face-à-face ---------- */
  .match-row{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:clamp(16px, 4vw, 48px);
    width:100%;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .player-panel{
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .player-profile-wrap{ margin-bottom:10px; }
  .player-name{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:clamp(14px, 2vw, 18px);
    color:var(--c-text);
    text-align:center;
    margin-bottom:22px;
    outline:none;
    min-width:60px;
  }
  .mini-team{ --row-gap: var(--gap-xs); display:flex; flex-direction:column; align-items:center; }
  .vs-divider{
    font-family:'Bebas Neue', sans-serif;
    font-size:clamp(26px, 4vw, 40px);
    color:var(--c-gold);
    letter-spacing:.05em;
    align-self:center;
    padding-top:clamp(36px, 7vw, 60px);
  }

  .hint{
    margin-top:26px;
    font-size:13px;
    color:var(--c-text-dim);
    text-align:center;
    max-width:560px;
    line-height:1.5;
  }
  .app-version{
    margin-top:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:.06em;
    color:var(--c-text-dim);
    opacity:.6;
    text-align:center;
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    bottom:26px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--c-panel);
    border:1px solid var(--c-line);
    color:var(--c-text);
    padding:12px 18px;
    border-radius:10px;
    font-size:13.5px;
    box-shadow:0 12px 30px rgba(0,0,0,0.5);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:200;
    max-width:90vw;
    text-align:center;
  }
  .toast.error{ border-color:var(--c-danger); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width:640px){
    .hex-row--offset{
      margin-top:calc(var(--hex-h-sm) * -0.22);
      transform:translateX(calc((var(--hex-w-sm) + var(--gap-sm)) / 2.3));
    }
    .hex-row--offset-xs{
      margin-top:calc(var(--hex-h-xs) * -0.22);
      transform:translateX(calc((var(--hex-w-xs) + var(--gap-xs)) / 2.3));
    }
    .match-row{ flex-direction:column; align-items:center; }
    .vs-divider{ padding:4px 0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

  <div class="page">

    <div class="toolbar-top">
      <div class="mode-switch" role="tablist">
        <button class="mode-btn active" data-mode="solo" type="button">Draft Sheet</button>
        <button class="mode-btn" data-mode="match" type="button">Encounter</button>
      </div>
      <div class="toolbar-actions">
        <button class="btn" id="resetAllBtn" type="button">↺ Reset</button>
        <button class="btn btn-gold" id="exportBtn" type="button">⤓ Export PNG</button>
      </div>
    </div>

    <div class="card" id="exportCard">
      <div class="eyebrow">RDV DRAFT LEAGUE · POKÉMON CHAMPIONS</div>
      <h1 class="main-title" id="mainTitle" contenteditable="true" data-placeholder="TITLE">RDV TITLE.</h1>
      <h2 class="sub-title" id="subTitle" contenteditable="true" data-placeholder="Subtile">SUBTITLE</h2>

      <div class="mode-view active" id="soloView">
        <div class="profile-wrap" id="soloProfileWrap"></div>
        <div class="team-grid" id="teamGrid"></div>
      </div>

      <div class="mode-view" id="matchView">
        <div class="match-row" id="matchRow"></div>
      </div>
    </div>

    <p class="hint">Clique sur un hexagone pour saisir le nom anglais d'un Pokémon, puis valide avec <strong>Entrée</strong>. Clique sur un hexagone doré pour ajouter une photo.</p>
    <p class="app-version">RdV Draft League Builder · v0.0.5</p>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const mainTitleEl = document.getElementById('mainTitle');
  const subTitleEl = document.getElementById('subTitle');
  /* Les valeurs de réinitialisation sont lues depuis le HTML au chargement :
     modifier les textes par défaut dans le <body> suffit, sans toucher au JS. */
  const DEFAULT_MAIN_TITLE = mainTitleEl.textContent;
  const DEFAULT_SUB_TITLE = subTitleEl.textContent;

  const TYPE_COLORS = {
    normal:"#A8A878", fire:"#F08030", water:"#6890F0", electric:"#F8D030",
    grass:"#78C850", ice:"#98D8D8", fighting:"#C03028", poison:"#A040A0",
    ground:"#E0C068", flying:"#A890F0", psychic:"#F85888", bug:"#A8B820",
    rock:"#B8A038", ghost:"#705898", dragon:"#7038F8", dark:"#705848",
    steel:"#B8B8D0", fairy:"#EE99AC"
  };

  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  function showToast(msg, isError){
    toastEl.textContent = msg;
    toastEl.classList.toggle('error', !!isError);
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3600);
  }

  function normalizeName(raw){
    return raw
      .trim()
      .toLowerCase()
      .replace(/♀/g, '-f')
      .replace(/♂/g, '-m')
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[.:'’]/g, '')
      .replace(/\s+/g, '-');
  }

  /* Applique une image dans un hexagone en background-cover :
     centrée, ajustée, bords tronqués si nécessaire — jamais étirée. */
  function setHexImage(el, url, label){
    el.style.backgroundImage = 'url("' + url + '")';
    if(label) el.setAttribute('aria-label', label);
    el.classList.add('visible');
  }
  function clearHexImage(el){
    el.style.removeProperty('background-image');
    el.removeAttribute('aria-label');
    el.classList.remove('visible');
  }

  /* Liste complète des noms (pour l'autocomplétion), chargée une seule fois. */
  let allNamesPromise = null;
  function ensureAllNames(){
    if(!allNamesPromise){
      allNamesPromise = fetch('https://pokeapi.co/api/v2/pokemon?limit=20000')
        .then(res => { if(!res.ok) throw new Error('network'); return res.json(); })
        .then(data => data.results.map(p => p.name))
        .catch(err => {
          allNamesPromise = null; // on retentera au prochain appel
          throw err;
        });
    }
    return allNamesPromise;
  }

  async function safeFetch(url){
    let res;
    try{
      res = await fetch(url);
    }catch(networkErr){
      throw new Error('network');
    }
    return res;
  }

  function extractImage(data){
    const artwork = data.sprites &&
      data.sprites.other &&
      data.sprites.other['official-artwork'] &&
      data.sprites.other['official-artwork'].front_default;
    const img = artwork || (data.sprites && data.sprites.front_default) || null;
    const type = (data.types && data.types[0] && data.types[0].type.name) || null;
    return { img, type };
  }

  async function fetchPokemon(rawName){
    const slug = normalizeName(rawName);
    if(!slug) throw new Error('empty');

    let res = await safeFetch('https://pokeapi.co/api/v2/pokemon/' + encodeURIComponent(slug));

    if(res.status === 404){
      /* Certains Pokémon n'existent que sous le nom de leur forme par défaut
         (ex : "mimikyu" -> "mimikyu-disguised"). On passe par l'endpoint
         espèce pour retrouver cette forme automatiquement. */
      const sres = await safeFetch('https://pokeapi.co/api/v2/pokemon-species/' + encodeURIComponent(slug));
      if(sres.status === 404) throw new Error('not-found');
      if(!sres.ok) throw new Error('network');
      const sdata = await sres.json();
      const variety = (sdata.varieties || []).find(v => v.is_default) || (sdata.varieties || [])[0];
      if(!variety || !variety.pokemon || !variety.pokemon.url) throw new Error('not-found');
      res = await safeFetch(variety.pokemon.url);
      if(res.status === 404) throw new Error('not-found');
    }
    if(!res.ok) throw new Error('network');
    const data = await res.json();
    const picked = extractImage(data);
    if(picked.img) return { img: picked.img, type: picked.type, name: data.name };

    /* Aucune image pour cette entrée : c'est le cas des formes purement
       utilitaires, comme les modes de monture de Miraidon
       (miraidon-low-power-mode, -drive-mode, -aquatic-mode, -glide-mode)
       ou les builds de Koraidon. Elles existent dans la base mais tous
       leurs champs de sprites sont null. On retombe alors automatiquement
       sur la forme par défaut de l'espèce. */
    if(data.species && data.species.url){
      const spRes = await safeFetch(data.species.url);
      if(spRes.ok){
        const spData = await spRes.json();
        const defVariety = (spData.varieties || []).find(v => v.is_default);
        if(defVariety && defVariety.pokemon && defVariety.pokemon.name !== data.name){
          const defRes = await safeFetch(defVariety.pokemon.url);
          if(defRes.ok){
            const defData = await defRes.json();
            const defPicked = extractImage(defData);
            if(defPicked.img){
              return {
                img: defPicked.img,
                type: defPicked.type,
                name: defData.name,
                fallbackFrom: data.name
              };
            }
          }
        }
      }
    }
    throw new Error('no-image');
  }

  /* ---------- Fabrique d'un hexagone "Pokémon" ---------- */
  function createTeamSlot(sizeClass, tagText){
    const slot = document.createElement('div');
    slot.className = 'hex-slot ' + sizeClass;
    slot.tabIndex = 0;
    slot.title = 'Cliquer pour saisir un Pokémon';

    slot.innerHTML = `
      ${tagText ? `<span class="pick-tag">${tagText}</span>` : ''}
      <div class="hex-border">
        <div class="hex-content">
          <div class="hex-img" role="img"></div>
          <div class="hex-placeholder">
            <span class="plus">+</span>
          </div>
          <div class="spinner"></div>
        </div>
      </div>
      <button class="clear-btn" type="button" title="Retirer ce Pokémon">✕</button>
    `;

    const border = slot.querySelector('.hex-border');
    const img = slot.querySelector('.hex-img');
    const clearBtn = slot.querySelector('.clear-btn');

    function flashError(){
      border.classList.add('is-error');
      setTimeout(() => border.classList.remove('is-error'), 850);
    }

    function openEditor(){
      if(slot.querySelector('.hex-editor')) return;
      const editor = document.createElement('div');
      editor.className = 'hex-editor';
      editor.innerHTML = `
        <input type="text" placeholder="Nom anglais (ex : ferrothorn)" autocomplete="off" spellcheck="false">
        <div class="hex-suggest"></div>
        <small>Entrée pour valider · ↑↓ pour naviguer · Échap pour annuler</small>
      `;
      slot.appendChild(editor);
      const input = editor.querySelector('input');
      const suggestBox = editor.querySelector('.hex-suggest');
      if(slot.dataset.name) input.value = slot.dataset.name;
      input.focus();
      input.select();

      let highlightIndex = -1;
      let currentItems = [];

      function close(){ editor.remove(); }

      function renderSuggestions(items, message){
        suggestBox.innerHTML = '';
        currentItems = items;
        highlightIndex = -1;
        if(message){
          const div = document.createElement('div');
          div.className = 'suggest-empty';
          div.textContent = message;
          suggestBox.appendChild(div);
          suggestBox.classList.add('open');
          return;
        }
        if(items.length === 0){
          suggestBox.classList.remove('open');
          return;
        }
        items.forEach((name) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = name;
          /* mousedown plutôt que click : se déclenche avant le blur de l'input */
          btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            close();
            submitName(name);
          });
          suggestBox.appendChild(btn);
        });
        suggestBox.classList.add('open');
      }

      function updateHighlight(){
        const buttons = suggestBox.querySelectorAll('button');
        buttons.forEach((b, i) => b.classList.toggle('highlight', i === highlightIndex));
        if(highlightIndex >= 0 && buttons[highlightIndex]){
          buttons[highlightIndex].scrollIntoView({ block: 'nearest' });
        }
      }

      async function refreshSuggestions(){
        const q = normalizeName(input.value);
        if(q.length < 2){
          renderSuggestions([]);
          return;
        }
        let names;
        try{
          names = await ensureAllNames();
        }catch(err){
          renderSuggestions([], 'Suggestions indisponibles (hors ligne ou environnement sandboxé)');
          return;
        }
        /* Le contenu du champ a pu changer pendant le chargement de la liste */
        if(normalizeName(input.value) !== q) return;
        const starts = [];
        const contains = [];
        for(const name of names){
          if(name.startsWith(q)) starts.push(name);
          else if(name.includes(q)) contains.push(name);
          if(starts.length >= 8) break;
        }
        renderSuggestions(starts.concat(contains).slice(0, 8));
      }

      input.addEventListener('input', refreshSuggestions);

      input.addEventListener('keydown', (e) => {
        e.stopPropagation();
        if(e.key === 'ArrowDown'){
          e.preventDefault();
          if(currentItems.length){
            highlightIndex = (highlightIndex + 1) % currentItems.length;
            updateHighlight();
          }
        } else if(e.key === 'ArrowUp'){
          e.preventDefault();
          if(currentItems.length){
            highlightIndex = (highlightIndex - 1 + currentItems.length) % currentItems.length;
            updateHighlight();
          }
        } else if(e.key === 'Enter'){
          const chosen = (highlightIndex >= 0 && currentItems[highlightIndex])
            ? currentItems[highlightIndex]
            : input.value.trim();
          close();
          if(chosen) submitName(chosen);
        } else if(e.key === 'Escape'){
          close();
        }
      });
      input.addEventListener('click', (e) => e.stopPropagation());
      input.addEventListener('blur', () => setTimeout(close, 120));

      /* Pré-charge la liste des noms dès l'ouverture de l'éditeur */
      ensureAllNames().catch(() => {});
    }

    async function submitName(name){
      slot.classList.add('loading');
      let result;
      try{
        result = await fetchPokemon(name);
      }catch(err){
        slot.classList.remove('loading');
        flashError();
        if(err.message === 'not-found'){
          showToast(`Pokémon introuvable : « ${name} ». Vérifie l'orthographe anglaise (ex : "ferrothorn", "mr-mime", "tapu-koko").`, true);
        }else if(err.message === 'no-image'){
          showToast(`« ${name} » existe dans la base mais ne possède aucune image dans PokéAPI (forme purement utilitaire, comme un mode de monture). Essaie une autre forme de ce Pokémon.`, true);
        }else if(err.message === 'empty'){
          // rien saisi, on ignore silencieusement
        }else{
          showToast("Connexion à PokéAPI impossible ici. Si tu es dans l'aperçu intégré de Claude.ai, ouvre le fichier téléchargé directement dans ton navigateur (double-clic) : le sandbox de l'aperçu bloque les appels réseau externes. Sinon, vérifie ta connexion internet.", true);
        }
        console.error('[Draft League Builder] échec récupération Pokémon "' + name + '":', err);
        return;
      }

      /* Pré-chargement via un objet Image pour conserver la détection
         de succès/échec, puis affichage en background-cover (non déformé,
         y compris dans l'export PNG). */
      const preloader = new Image();
      preloader.onload = () => {
        setHexImage(img, result.img, result.name);
        slot.classList.add('filled');
        slot.dataset.name = result.name;
        const color = TYPE_COLORS[result.type];
        if(color) border.style.setProperty('--ring-color', color);
        slot.title = 'Cliquer pour changer ce Pokémon';
        slot.classList.remove('loading');
        if(result.fallbackFrom){
          showToast(`« ${result.fallbackFrom} » n'a pas d'image propre dans PokéAPI — artwork de « ${result.name} » affiché à la place.`);
        }
      };
      preloader.onerror = () => {
        slot.classList.remove('loading');
        flashError();
        showToast("L'image de ce Pokémon n'a pas pu être chargée (réseau ou image indisponible). Réessaie.", true);
        console.error('[Draft League Builder] échec chargement image pour "' + result.name + '"');
      };
      preloader.src = result.img;
    }

    function clearSlot(){
      clearHexImage(img);
      slot.classList.remove('filled');
      delete slot.dataset.name;
      border.style.removeProperty('--ring-color');
      slot.title = 'Cliquer pour saisir un Pokémon';
    }

    slot.addEventListener('click', (e) => {
      if(e.target.closest('.clear-btn')) return;
      openEditor();
    });
    slot.addEventListener('keydown', (e) => {
      if((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.hex-editor')){
        e.preventDefault();
        openEditor();
      }
    });
    clearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearSlot();
    });

    return slot;
  }

  /* ---------- Fabrique d'un hexagone "photo de profil" ---------- */
  function createProfileSlot(sizeClass){
    const slot = document.createElement('div');
    slot.className = 'hex-slot hex-slot--is-profile ' + sizeClass;
    slot.tabIndex = 0;
    slot.title = 'Cliquer pour ajouter une photo';

    slot.innerHTML = `
      <div class="hex-border">
        <div class="hex-content">
          <div class="hex-img" role="img" aria-label="Photo de profil"></div>
          <div class="hex-placeholder">
            <span class="plus">+</span>
            <span class="hex-label">Photo</span>
          </div>
        </div>
      </div>
      <button class="clear-btn" type="button" title="Retirer la photo">✕</button>
      <input type="file" accept="image/*" hidden>
    `;

    const img = slot.querySelector('.hex-img');
    const fileInput = slot.querySelector('input[type="file"]');
    const clearBtn = slot.querySelector('.clear-btn');

    slot.addEventListener('click', (e) => {
      if(e.target.closest('.clear-btn')) return;
      fileInput.click();
    });
    slot.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        fileInput.click();
      }
    });
    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        setHexImage(img, reader.result, 'Photo de profil');
        slot.classList.add('filled');
      };
      reader.readAsDataURL(file);
    });
    clearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearHexImage(img);
      slot.classList.remove('filled');
      fileInput.value = '';
    });

    return slot;
  }

  /* ---------- Construction : mode solo (1 profil + 10 Pokémon) ---------- */
  document.getElementById('soloProfileWrap').appendChild(createProfileSlot('hex-slot--profile-lg'));

    showToast('Fiche réinitialisée.');
  });

  /* ---------- Export PNG : moteur de rendu canvas dédié ----------
     Pourquoi ne pas capturer le DOM (html2canvas & co) ? Deux raisons :
     1. la mise en page à l'écran est responsive (unités vw), donc la
        capture dépendait de la taille de la fenêtre ;
     2. html2canvas ne supporte pas clip-path : les hexagones
        ressortaient en carrés.
     Ici, la fiche est redessinée de zéro sur un canvas aux dimensions
     FIXES (largeur logique 960 px × échelle 2 = PNG de 1920 px de large),
     avec de vrais tracés hexagonaux et un cadrage d'image "cover". */

  const EXPORT_STYLE = {
    scale: 2, W: 960, padX: 48, padTop: 56, padBottom: 44, radius: 20,
    ink: '#0e0f13', panel: '#1b1e27', panel2: '#20232d', line: '#2a2e3a',
    gold: '#d4a954', text: '#edeef2', dim: '#8a8f9c',
    hexRatio: 1.1547,
    hexInset: 5,
    hex: { lg: 224, md: 150, sm: 130, xs: 92 },
    gap: { sm: 18, xs: 14 }
  };

  function hexTracePath(ctx, x, y, w, h){
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y);
    ctx.lineTo(x + w, y + h * 0.25);
    ctx.lineTo(x + w, y + h * 0.75);
    ctx.lineTo(x + w / 2, y + h);
    ctx.lineTo(x, y + h * 0.75);
    ctx.lineTo(x, y + h * 0.25);
    ctx.closePath();
  }

  function roundRectPath(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  /* Dessine l'image en "cover" : centrée, remplissant la zone,
     bords tronqués si les proportions diffèrent — jamais étirée. */
  function drawCoverImage(ctx, image, x, y, w, h){
    const iw = image.naturalWidth || image.width;
    const ih = image.naturalHeight || image.height;
    if(!iw || !ih) return;
    const imgRatio = iw / ih;
    const boxRatio = w / h;
    let sx = 0, sy = 0, sw = iw, sh = ih;
    if(imgRatio > boxRatio){
      sw = ih * boxRatio;
      sx = (iw - sw) / 2;
    } else {
      sh = iw / boxRatio;
      sy = (ih - sh) / 2;
    }
    ctx.drawImage(image, sx, sy, sw, sh, x, y, w, h);
  }

  function wrapText(ctx, text, maxWidth){
    const words = text.split(/\s+/).filter(Boolean);
    const lines = [];
    let line = '';
    for(const word of words){
      const test = line ? line + ' ' + word : word;
      if(!line || ctx.measureText(test).width <= maxWidth){
        line = test;
      } else {
        lines.push(line);
        line = word;
      }
    }
    if(line) lines.push(line);
    return lines;
  }

  function loadImageForExport(url){
    return new Promise((resolve) => {
      const im = new Image();
      im.crossOrigin = 'anonymous';
      im.onload = () => resolve(im);
      im.onerror = () => resolve(null);
      im.src = url;
    });
  }

  function slotImageUrl(slot){
    const el = slot.querySelector('.hex-img');
    const m = /url\(["']?(.+?)["']?\)/.exec((el && el.style.backgroundImage) || '');
    return m ? m[1] : null;
  }

  function collectSlotState(slot){
    const tagEl = slot.querySelector('.pick-tag');
    return {
      url: slotImageUrl(slot),
      ring: (slot.querySelector('.hex-border').style.getPropertyValue('--ring-color') || '').trim() || null,
      tag: tagEl ? tagEl.textContent : null,
      isProfile: slot.classList.contains('hex-slot--is-profile'),
      image: null
    };
  }

  function drawHexSlot(ctx, state, x, y, w){
    const C = EXPORT_STYLE;
    const h = w * C.hexRatio;
    hexTracePath(ctx, x, y, w, h);
    ctx.fillStyle = state.ring || (state.isProfile ? C.gold : C.line);
    ctx.fill();
    const i = C.hexInset;
    const ix = x + i, iy = y + i, iw = w - 2 * i, ih = h - 2 * i;
    hexTracePath(ctx, ix, iy, iw, ih);
    ctx.fillStyle = C.panel;
    ctx.fill();
    if(state.image){
      ctx.save();
      hexTracePath(ctx, ix, iy, iw, ih);
      ctx.clip();
      drawCoverImage(ctx, state.image, ix, iy, iw, ih);
      ctx.restore();
    } else {
      ctx.fillStyle = C.dim;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '300 ' + Math.max(20, Math.round(w * 0.2)) + 'px Inter, sans-serif';
      if(state.isProfile){
        ctx.fillText('+', x + w / 2, y + h / 2 - 10);
        ctx.font = '400 11px Inter, sans-serif';
        ctx.fillText('PHOTO', x + w / 2, y + h / 2 + 14);
      } else {
        ctx.fillText('+', x + w / 2, y + h / 2);
      }
    }
  }

  function drawPickTag(ctx, centerX, hexTopY, text){
    const C = EXPORT_STYLE;
    ctx.font = '600 10px "JetBrains Mono", monospace';
    const tw = ctx.measureText(text).width;
    const pillW = tw + 16, pillH = 17;
    const x = centerX - pillW / 2, y = hexTopY - 9;
    roundRectPath(ctx, x, y, pillW, pillH, pillH / 2);
    ctx.fillStyle = C.ink;
    ctx.fill();
    ctx.strokeStyle = C.line;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = C.gold;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, centerX, y + pillH / 2 + 0.5);
  }

  async function renderExportCanvas(){
    const C = EXPORT_STYLE;
    const isMatch = matchView.classList.contains('active');
    const innerW = C.W - 2 * C.padX;
    const cx = C.W / 2;
    const smH = C.hex.sm * C.hexRatio;
    const xsH = C.hex.xs * C.hexRatio;
    const lgH = C.hex.lg * C.hexRatio;
    const mdH = C.hex.md * C.hexRatio;

    try{ await document.fonts.ready; }catch(e){ /* polices système en secours */ }

    /* 1. Collecte de l'état affiché depuis le DOM */
    let soloData = null, matchData = null;
    if(!isMatch){
      soloData = {
        profile: collectSlotState(soloView.querySelector('.hex-slot--is-profile')),
        team: Array.from(soloView.querySelectorAll('.hex-slot--sm')).map(collectSlotState)
      };
    } else {
      matchData = Array.from(matchView.querySelectorAll('.player-panel')).map(panel => ({
        profile: collectSlotState(panel.querySelector('.hex-slot--is-profile')),
        name: panel.querySelector('.player-name').textContent.trim(),
        team: Array.from(panel.querySelectorAll('.hex-slot--xs')).map(collectSlotState)
      }));
    }
    const allSlots = isMatch
      ? matchData.flatMap(p => [p.profile].concat(p.team))
      : [soloData.profile].concat(soloData.team);
    await Promise.all(allSlots.map(async s => {
      if(s.url) s.image = await loadImageForExport(s.url);
    }));

    /* 2. Mesures des textes d'en-tête */
    const scratch = document.createElement('canvas').getContext('2d');
    const eyebrowText = document.querySelector('.eyebrow').textContent.trim();
    const titleText = mainTitleEl.textContent.trim();
    const subText = subTitleEl.textContent.trim();
    scratch.font = '400 64px "Bebas Neue", sans-serif';
    const titleLines = titleText ? wrapText(scratch, titleText, innerW) : [];
    scratch.font = '500 18px Inter, sans-serif';
    const subLines = subText ? wrapText(scratch, subText, innerW) : [];

    /* 3. Hauteur totale (fixe pour un contenu donné, indépendante de la fenêtre) */
    let y = C.padTop;
    if(eyebrowText) y += 12 + 14;
    if(titleLines.length) y += titleLines.length * 65 + 6;
    y += subLines.length * 27;
    y += 30;
    const contentTop = y;
    let H;
    if(!isMatch){
      const gridH = smH * 2 - smH * 0.26;
      H = Math.round(contentTop + lgH + 34 + gridH + C.padBottom);
    } else {
      const miniGridH = xsH * 2 - xsH * 0.26;
      H = Math.round(contentTop + mdH + 10 + 22 + 22 + miniGridH + C.padBottom);
    }

    /* 4. Dessin */
    const cv = document.createElement('canvas');
    cv.width = C.W * C.scale;
    cv.height = H * C.scale;
    const ctx = cv.getContext('2d');
    ctx.scale(C.scale, C.scale);
    const supportsLS = 'letterSpacing' in ctx;

    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, C.panel);
    grad.addColorStop(1, C.panel2);
    roundRectPath(ctx, 0.5, 0.5, C.W - 1, H - 1, C.radius);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = C.line;
    ctx.lineWidth = 1;
    ctx.stroke();

    let ty = C.padTop;
    if(eyebrowText){
      ctx.font = '600 12px "JetBrains Mono", monospace';
      if(supportsLS) ctx.letterSpacing = '2.16px';
      ctx.fillStyle = C.gold;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(eyebrowText, cx, ty);
      if(supportsLS) ctx.letterSpacing = '0px';
      ty += 12 + 14;
    }
    if(titleLines.length){
      ctx.font = '400 64px "Bebas Neue", sans-serif';
      if(supportsLS) ctx.letterSpacing = '1.9px';
      ctx.fillStyle = C.text;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for(const line of titleLines){ ctx.fillText(line, cx, ty); ty += 65; }
      if(supportsLS) ctx.letterSpacing = '0px';
      ty += 6;
    }
    if(subLines.length){
      ctx.font = '500 18px Inter, sans-serif';
      ctx.fillStyle = C.dim;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for(const line of subLines){ ctx.fillText(line, cx, ty); ty += 27; }
    }

    if(!isMatch){
      drawHexSlot(ctx, soloData.profile, cx - C.hex.lg / 2, contentTop, C.hex.lg);
      const gridTop = contentTop + lgH + 34;
      const rowW = 5 * C.hex.sm + 4 * C.gap.sm;
      const r1x = cx - rowW / 2;
      const r2x = r1x + (C.hex.sm + C.gap.sm) / 2;
      const r2y = gridTop + smH - smH * 0.26;
      soloData.team.forEach((s, i) => {
        const inRow2 = i >= 5;
        const x = (inRow2 ? r2x : r1x) + (i % 5) * (C.hex.sm + C.gap.sm);
        const yy = inRow2 ? r2y : gridTop;
        drawHexSlot(ctx, s, x, yy, C.hex.sm);
        if(s.tag) drawPickTag(ctx, x + C.hex.sm / 2, yy, s.tag);
      });
    } else {
      const panelW = 3 * C.hex.xs + 2 * C.gap.xs;
      ctx.font = '400 40px "Bebas Neue", sans-serif';
      const vsW = ctx.measureText('VS').width;
      const startX = cx - (panelW * 2 + 48 * 2 + vsW) / 2;
      const panelXs = [startX, startX + panelW + 48 + vsW + 48];
      ctx.fillStyle = C.gold;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('VS', startX + panelW + 48 + vsW / 2, contentTop + mdH / 2 - 20);
      matchData.forEach((p, idx) => {
        const pxL = panelXs[idx];
        const pcx = pxL + panelW / 2;
        drawHexSlot(ctx, p.profile, pcx - C.hex.md / 2, contentTop, C.hex.md);
        const nameY = contentTop + mdH + 10;
        if(p.name){
          ctx.font = '700 18px Inter, sans-serif';
          ctx.fillStyle = C.text;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(p.name, pcx, nameY);
        }
        const gridTop = nameY + 22 + 22;
        const r1x = pxL;
        const r2x = pxL + (C.hex.xs + C.gap.xs) / 2;
        const r2y = gridTop + xsH - xsH * 0.26;
        p.team.forEach((s, i) => {
          const inRow2 = i >= 3;
          const x = (inRow2 ? r2x : r1x) + (i % 3) * (C.hex.xs + C.gap.xs);
          drawHexSlot(ctx, s, x, inRow2 ? r2y : gridTop, C.hex.xs);
        });
      });
    }
    return cv;
  }

  document.getElementById('exportBtn').addEventListener('click', async () => {
    const btn = document.getElementById('exportBtn');
    const original = btn.textContent;
    btn.textContent = '⏳ Export en cours…';
    btn.disabled = true;
    try{
      const canvas = await renderExportCanvas();
      const title = mainTitleEl.textContent.trim();
      const filename = (title ? title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '') : 'draft-league-visuel') + '.png';
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }catch(err){
      showToast('Export impossible : ' + err.message, true);
      console.error('[Draft League Builder] échec export PNG:', err);
    }finally{
      btn.textContent = original;
      btn.disabled = false;
    }
  });

})();
</script>
</body>
</html>
